services:
  - type: web
    name: nyaya-graph
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
